<!DOCTYPE html>
<html>
<head>
    <title>Report Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .grid-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: grid; grid-template-columns: repeat(10, 1fr); grid-template-rows: repeat(10, 1fr); }
        
        /* Updated to Light Grey for better visibility */
        .cell { border: 0.5px solid rgba(203, 213, 225, 0.6); }
        
        #marker { position: absolute; width: 18px; height: 18px; background: #ef4444; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 15px rgba(239, 68, 68, 0.5); transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 20; }
        
        .axis-label-container { font-family: sans-serif; font-size: 10px; color: black; font-weight: bold; }
    </style>
</head>
<body class="bg-slate-100 p-10 font-sans">
    <div class="flex w-full gap-10 items-start justify-start">
        
        <div class="flex flex-col items-center">
            <div class="flex flex-col w-full max-w-[800px] items-start mb-6">
                <h1 class="text-sky-700 text-2xl font-black tracking-tighter uppercase">AMSA | Sentinel</h1>
            </div>

            <div class="relative flex items-start gap-2">
                <div class="axis-label-container flex flex-col-reverse justify-between h-[500px] py-[2px] text-right w-8 mt-1">
                    <span>0</span><span>20</span><span>40</span><span>60</span><span>80</span><span>100</span>
                </div>

                <div class="flex flex-col gap-2">
                    <div class="relative border-8 border-slate-700 rounded-2xl overflow-hidden shadow-2xl w-[800px] h-[500px] bg-white">
                        <img src="Open_mine.jpg" class="w-full h-full object-cover opacity-100">
                        <div class="grid-layer" id="grid"></div>
                        <div id="marker" style="top: -10%; left: -10%;"></div>
                    </div>

                    <div class="axis-label-container flex justify-between px-[2px] w-[800px]">
                        <span>0</span><span>20</span><span>40</span><span>60</span><span>80</span><span>100</span>
                    </div>
                </div>
            </div>

            <div id="log" class="mt-8 text-slate-800 font-mono text-[13px] font-bold bg-white px-6 py-3 rounded-lg border border-slate-200 shadow-sm self-start ml-10 uppercase tracking-tight">
                Network Status: Ready - Waiting for incoming reports...
            </div>
        </div>

        <div class="flex-1 bg-white rounded-2xl border border-slate-200 shadow-xl overflow-hidden">
            <div class="bg-slate-700 p-4">
                <h3 class="text-white font-bold uppercase tracking-wider text-sm">Recent Activity Log</h3>
            </div>
            <table class="w-full text-left text-sm">
                <thead class="bg-slate-50 border-b border-slate-200 text-slate-500 uppercase text-[10px] font-bold">
                    <tr>
                        <th class="px-4 py-3">User</th>
                        <th class="px-4 py-3">Type</th>
                        <th class="px-4 py-3">Coord</th>
                        <th class="px-4 py-3">Status</th>
                    </tr>
                </thead>
                <tbody id="reportTableBody" class="divide-y divide-slate-100">
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, limit, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

<secret-config>

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const grid = document.getElementById('grid');
        const tableBody = document.getElementById('reportTableBody');
        
        for(let i=0; i<100; i++) grid.innerHTML += '<div class="cell"></div>';

        window.updateStatus = async (reportId, newStatus) => {
            const reportRef = doc(db, "reports", reportId);
            try {
                if (newStatus === 'resolved') {
                    await deleteDoc(reportRef);
                } else {
                    await updateDoc(reportRef, { status: newStatus });
                }
            } catch (error) {
                console.error("Error updating/deleting document:", error);
            }
        };

        const qLatest = query(collection(db, "reports"), orderBy("time", "desc"), limit(1));
        onSnapshot(qLatest, (snapshot) => {
            snapshot.forEach((doc) => {
                const data = doc.data();
                document.getElementById('marker').style.left = data.x + "%";
                document.getElementById('marker').style.top = (100 - data.y) + "%"; 
                document.getElementById('log').innerText = `LATEST: [${data.x}, ${data.y}] ${data.type || 'General'} REPORTED BY ${data.user || 'Anonymous'}`;
            });
        });

        const qHistory = query(collection(db, "reports"), orderBy("time", "desc"), limit(5));
        onSnapshot(qHistory, (snapshot) => {
            tableBody.innerHTML = '';
            snapshot.forEach((reportDoc) => {
                const data = reportDoc.data();
                const id = reportDoc.id;
                const row = `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-4 py-3 font-semibold text-sky-700">${data.user || 'Anonymous'}</td>
                        <td class="px-4 py-3 text-slate-600 capitalize">${data.type || 'General'}</td>
                        <td class="px-4 py-3 font-mono text-slate-400 text-xs">[${data.x}, ${data.y}]</td>
                        <td class="px-4 py-3">
                            <select onchange="updateStatus('${id}', this.value)" class="text-[10px] font-bold uppercase p-1 rounded border border-slate-200 outline-none bg-white">
                                <option value="pending" class="bg-white text-slate-800" ${data.status === 'pending' ? 'selected' : ''}>Pending</option>
                                <option value="investigating" class="bg-white text-slate-800" ${data.status === 'investigating' ? 'selected' : ''}>Investigating</option>
                                <option value="resolved" class="bg-white text-slate-800">Resolved</option>
                            </select>
                        </td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });
        });
    </script>
</body>
</html>
