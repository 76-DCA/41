<!DOCTYPE html>
<html>
<head>
    <title>Submit Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .phone-frame {
            width: 375px;
            height: 80vh; 
            min-height: 650px;
            border: 12px solid #334155; 
            border-radius: 3rem;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .phone-notch {
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 150px; height: 22px;
            background: #334155;
            border-bottom-left-radius: 1rem;
            border-bottom-right-radius: 1rem;
            z-index: 50;
        }

        .home-bar {
            position: absolute;
            bottom: 8px; left: 50%;
            transform: translateX(-50%);
            width: 100px; height: 4px;
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
            z-index: 50;
        }

        .grid-layer { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            display: grid; 
            grid-template-columns: repeat(10, 1fr); 
            grid-template-rows: repeat(10, 1fr); 
            z-index: 10;
        }

        /* Updated to Light Grey for better visibility */
        .cell { border: 0.5px solid rgba(203, 213, 225, 0.6); }
        
        #marker { 
            position: absolute; 
            width: 14px; height: 14px; 
            background: #ef4444; 
            border: 2px solid white; 
            border-radius: 50%; 
            transform: translate(-50%, -50%); 
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.5); 
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            z-index: 30;
        }

        .app-content { scrollbar-width: none; -ms-overflow-style: none; }
        .app-content::-webkit-scrollbar { display: none; }

        #loginOverlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.98);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            padding: 2rem;
        }
    </style>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen font-sans">

    <div class="phone-frame bg-white shadow-2xl">
        <div class="phone-notch"></div>
        
        <div id="loginOverlay">
            <h2 class="text-xl font-bold text-sky-600 mb-6 text-center uppercase tracking-wider">Employee Portal</h2>
            <div class="space-y-4">
                <input type="text" id="empId" placeholder="Employee ID" 
                    class="w-full bg-slate-50 p-3 rounded-lg outline-none text-slate-800 border border-slate-200 focus:border-sky-500">
                <input type="password" id="empPass" placeholder="Password" 
                    class="w-full bg-slate-50 p-3 rounded-lg outline-none text-slate-800 border border-slate-200 focus:border-sky-500">
                <button onclick="handleLogin()" 
                    class="w-full bg-sky-600 hover:bg-sky-700 text-white py-3 rounded-lg font-bold shadow-md">
                    Confirm Login
                </button>
                <button onclick="toggleLogin(false)" class="w-full text-slate-400 text-sm mt-2 hover:text-slate-600">Cancel</button>
            </div>
        </div>
        
        <div class="app-content flex-1 p-6 pt-12 flex flex-col gap-4 overflow-y-auto">
            <header class="text-center">
                <h1 class="text-xl font-bold text-sky-700 uppercase tracking-tighter">AMSA | Sentinel</h1>
                <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Sishen Community Reporting Portal</h2>
            </header>

            <div class="relative px-8 pb-8 pt-2">
                <div class="absolute left-1 top-2 bottom-8 flex flex-col-reverse justify-between items-end w-5 text-[10px] text-slate-400 font-bold leading-none py-[1px]">
                    <span>0</span><span>20</span><span>40</span><span>60</span><span>80</span><span>100</span>
                </div>
                
                <div class="relative aspect-square w-full bg-slate-200 rounded-lg border border-slate-300 overflow-hidden shadow-inner">
                    <img src="Open_mine.jpg" 
                         class="absolute inset-0 w-full h-full object-cover opacity-100">
                    <div id="grid" class="grid-layer"></div>
                    <div id="marker" style="left: -10%; top: -10%;"></div>
                </div>

                <div class="absolute left-8 right-8 bottom-2 flex justify-between px-[1px] h-4 text-[10px] text-slate-400 font-bold">
                    <span>0</span><span>20</span><span>40</span><span>60</span><span>80</span><span>100</span>
                </div>
            </div>

            <div class="space-y-3">
                <div class="flex gap-3">
                    <input type="number" id="x" placeholder="X" class="w-1/2 p-3 rounded-lg outline-none bg-slate-50 text-slate-800 border border-slate-200 focus:border-sky-500">
                    <input type="number" id="y" placeholder="Y" class="w-1/2 p-3 rounded-lg outline-none bg-slate-50 text-slate-800 border border-slate-200 focus:border-sky-500">
                </div>

                <select id="type" class="w-full p-3 rounded-lg outline-none bg-slate-50 text-slate-800 border border-slate-200 focus:border-sky-500">
                    <option value="" disabled selected>Select Incident Type</option>
                    <option value="unauthorised trespassing">Unauthorised Trespassing</option>
                    <option value="illegal mining sighting">Illegal Mining Sighting</option>
                    <option value="suspicious vehicle">Suspicious Vehicle</option>
                    <option value="infrastructure damage">Infrastructure Damage</option>
                </select>

                <button onclick="submitReport()" 
                    class="w-full bg-sky-600 hover:bg-sky-700 text-white py-3 rounded-lg font-bold transition-all active:scale-95 shadow-lg shadow-sky-100">
                    Transmit Data
                </button>
                
                <button id="loginBtn" onclick="toggleLogin(true)" 
                    class="w-full bg-sky-50 hover:bg-sky-100 text-sky-700 py-2 rounded-lg font-semibold text-sm transition-all border border-sky-200">
                    Staff Login
                </button>

                <button id="logoutBtn" onclick="handleLogout()" 
                    class="w-full bg-rose-50 hover:bg-rose-100 text-rose-600 py-2 rounded-lg font-semibold text-sm transition-all border border-rose-100 hidden">
                    Logout Staff Account
                </button>

                <p id="msg" class="text-center text-emerald-600 text-sm font-bold hidden">✓ Signal Transmitted</p>
                
                <div id="status" class="text-center text-[9px] text-slate-400 font-mono mt-2 uppercase tracking-tight">
                    Network Status: Ready
                </div>
            </div>
        </div>

        <div class="home-bar"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

<secret-config>

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const grid = document.getElementById('grid');
        const marker = document.getElementById('marker');
        const status = document.getElementById('status');
        
        let currentUser = null;

        for(let i=0; i<100; i++) grid.innerHTML += '<div class="cell"></div>';

        const q = query(collection(db, "reports"), orderBy("time", "desc"), limit(1));
        onSnapshot(q, (snapshot) => {
            snapshot.forEach(doc => {
                const data = doc.data();
                marker.style.left = data.x + '%';
                marker.style.top = (100 - data.y) + '%'; 
                status.innerText = `LATEST: [${data.x}, ${data.y}] ${data.type || 'General'} BY ${data.user || 'Anonymous'}`;
            });
        });

        window.toggleLogin = (show) => {
            document.getElementById('loginOverlay').style.display = show ? 'flex' : 'none';
        };

        window.handleLogin = () => {
            const id = document.getElementById('empId').value;
            const pass = document.getElementById('empPass').value;

            if (id === "Employee321" && pass === "Password123") {
                currentUser = id;
                document.getElementById('loginBtn').classList.add('hidden');
                document.getElementById('logoutBtn').classList.remove('hidden');
                toggleLogin(false);
            } else {
                alert("Invalid Credentials");
            }
        };

        window.handleLogout = () => {
            currentUser = null;
            document.getElementById('loginBtn').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.add('hidden');
        };

        window.submitReport = async () => {
            const x = document.getElementById('x').value;
            const y = document.getElementById('y').value;
            const type = document.getElementById('type').value;

            if(!x || !y || !type) return alert("Please complete all fields.");

            try {
                await addDoc(collection(db, "reports"), {
                    x: Number(x), 
                    y: Number(y), 
                    type: type,
                    status: "pending",
                    user: currentUser || "Anonymous",
                    time: serverTimestamp()
                });
                const msg = document.getElementById('msg');
                msg.classList.remove('hidden');
                setTimeout(() => msg.classList.add('hidden'), 3000);
            } catch (e) {
                console.error(e);
                alert("Submission failed.");
            }
        };
    </script>
</body>
</html>
